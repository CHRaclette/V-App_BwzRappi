<ActionBar class="app-header">
  <NavigationButton visibility="hidden"></NavigationButton>
  <GridLayout columns="50, *" class="app-header-grid">
    <Label class="action-bar-title app-header-title" text="Login" colSpan="2"></Label>
    <Label
      col="0"
      class="fas app-header-icon"
      text="&#xf0c9;"
      horizontalAlignment="center"
      verticalAlignment="center"
      (tap)="onDrawerButtonTap()"
    ></Label>
  </GridLayout>
</ActionBar>

<ScrollView>
  <StackLayout class="page__content p-20" spacing="12">
    <Label class="h2" text="Login"></Label>
    <TextField
      hint="Username"
      [(ngModel)]="username"
      autocorrect="false"
      autocapitalizationType="none"
    ></TextField>
    <TextField hint="Password" secure="true" [(ngModel)]="password"></TextField>
    <Button text="Login" (tap)="onLoginTap()"></Button>
    <Button class="btn btn-outline" text="Create an account" (tap)="onGoToSignupTap()"></Button>
    <Label [text]="error" class="text-danger" textWrap="true"></Label>
  </StackLayout>
</ScrollView>
